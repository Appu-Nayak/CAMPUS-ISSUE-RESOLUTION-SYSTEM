<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Status - AI Campus Resolver</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="bg-gradient"></div>
    
    <nav class="navbar">
        <a href="index.html" class="nav-brand">
            <i class="fa-solid fa-graduation-cap"></i>
            CampusResolver
        </a>
        <div class="nav-links">
            <a href="student.html" class="nav-link">Submit Issue</a>
            <a href="status.html" class="nav-link active">Check Status</a>
            <a href="admin.html" class="nav-link btn btn-outline" style="padding: 0.4rem 1rem;">Admin</a>
        </div>
    </nav>

    <div class="container animate-fade-in">
        <div class="text-center mb-4">
            <h2>My Reported Issues</h2>
            <p class="mt-1" style="color: var(--text-muted);">Track the resolution progress of your submitted complaints</p>
        </div>

        <div class="glass-card mb-4" style="display: flex; gap: 1rem; align-items: center; max-width: 600px; margin: 0 auto 2rem;">
            <input type="text" id="searchUsn" class="form-control" placeholder="Enter your USN (e.g., 1RV21CS001)" style="flex: 1;">
            <button class="btn btn-primary" onclick="searchByUsn()">Track Status</button>
        </div>

        <div class="glass-card" style="min-height: 300px; padding: 0;">
            <div id="statusLoader" class="hidden" style="display: flex; justify-content: center; align-items: center; height: 300px;">
                <span class="loader" style="width: 40px; height: 40px;"></span>
            </div>
            
            <div id="statusContent" class="hidden">
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Issue Details</th>
                                <th>Category</th>
                                <th>Priority</th>
                                <th>Assigned To</th>
                                <th>Status</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody id="statusTableBody">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
            
            <div id="emptyState" style="text-align: center; padding: 4rem 2rem;">
                <i class="fa-regular fa-folder-open" style="font-size: 4rem; color: var(--border); margin-bottom: 1rem;"></i>
                <h3>Enter USN to Track</h3>
                <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Please enter your University Serial Number above to view your complaints.</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function searchByUsn() {
            const usn = document.getElementById('searchUsn').value.trim();
            if (usn) {
                loadStudentComplaints(usn);
            }
        }
    </script>
</body>
</html>

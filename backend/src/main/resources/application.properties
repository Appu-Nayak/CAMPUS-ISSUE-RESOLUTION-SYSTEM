# ============================================================
# AI-Powered Campus Issue Resolution System
# Application Configuration
# ============================================================

# Server
server.port=8080
spring.application.name=campus-resolver

# -----------------------------------------------
# MySQL Database Configuration
# -----------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/campus_resolver_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Enter your mysql password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# -----------------------------------------------
# OpenRouter AI API Configuration
# -----------------------------------------------
# Get your key from: https://openrouter.ai/keys
openrouter.api.key=Enter your key here 
openrouter.api.url=https://openrouter.ai/api/v1/chat/completions
openrouter.api.model=openai/gpt-3.5-turbo

# -----------------------------------------------
# Logging
# -----------------------------------------------
logging.level.com.campusresolver=DEBUG
logging.level.org.springframework.web=INFO

# -----------------------------------------------
# CORS (allow frontend dev server)
# -----------------------------------------------
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://127.0.0.1:5500,http://localhost:5500
